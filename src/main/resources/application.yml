spring:
  application:
    name: ponte
  datasource:
    url: jdbc:h2:mem:ponte;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

ponte:
  uploads:
    dir: ${user.home}/.ponte/uploads
  ai:
    pictogram:
      # TODO: inserir chave da API de geração de pictogramas.
      # Sem chave, o stub (foto recortada em quadrado) é usado.
      api-key: ""
    prediction:
      # TODO: inserir chave da API de predição de frase (LLM).
      # Sem chave, o stub baseado em templates por categoria é usado.
      api-key: ""
