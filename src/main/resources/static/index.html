<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0D9488">
  <title>Ponte — Prancha de Comunicação</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="brand-mark" src="/icons/logo-mark.png" alt="">
      <span class="brand-name">ponte</span>
    </div>
    <nav class="topbar-actions">
      <button id="btn-add" class="btn-ghost" aria-label="Adicionar símbolo">＋</button>
      <a class="btn-ghost" href="/dashboard.html" aria-label="Painel do terapeuta">📈</a>
      <button id="btn-revoke-consent" class="btn-ghost" aria-label="Revogar consentimento" hidden>🔓</button>
    </nav>
  </header>

  <section class="sentence-area" aria-label="Frase montada">
    <div id="sentence-bar" class="sentence-bar" aria-live="polite"></div>
    <div class="sentence-actions">
      <button id="btn-speak" class="btn-action btn-speak" aria-label="Falar frase">▶ Falar</button>
      <button id="btn-undo" class="btn-action" aria-label="Apagar último símbolo">⌫</button>
      <button id="btn-clear" class="btn-action" aria-label="Limpar frase">✕</button>
    </div>
  </section>

  <section id="suggestion" class="suggestion" aria-label="Sugestão de frase" hidden></section>

  <main id="grid" class="grid" aria-label="Prancha de símbolos"></main>

  <dialog id="consent-gate">
    <form id="consent-form">
      <h2>Autorização do responsável</h2>
      <p class="consent-purpose">
        Para usar a prancha, um responsável precisa autorizar o registro de uso da
        criança, conforme a LGPD. Finalidade: registro de uso da prancha para
        acompanhamento terapêutico.
      </p>
      <label>Nome do responsável
        <input type="text" name="guardianName" required maxlength="80" autocomplete="off">
      </label>
      <p id="consent-error" class="dialog-error" hidden></p>
      <menu>
        <button type="submit" class="btn-action btn-speak">Autorizar</button>
      </menu>
    </form>
  </dialog>

  <dialog id="add-dialog">
    <form id="add-form">
      <h2>Novo símbolo</h2>
      <label>Foto
        <input type="file" name="photo" accept="image/*" capture="environment" required>
      </label>
      <label>Nome (o que será falado)
        <input type="text" name="label" required maxlength="40" autocomplete="off">
      </label>
      <label>Categoria
        <select name="category">
          <option value="PERSONALIZADO" selected>Personalizado</option>
          <option value="COMIDA">Comida</option>
          <option value="SENTIMENTOS">Sentimentos</option>
          <option value="PESSOAS">Pessoas</option>
          <option value="ACOES">Ações</option>
        </select>
      </label>
      <menu>
        <button type="button" id="add-cancel" class="btn-action">Cancelar</button>
        <button type="submit" class="btn-action btn-speak">Adicionar</button>
      </menu>
    </form>
  </dialog>

  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
