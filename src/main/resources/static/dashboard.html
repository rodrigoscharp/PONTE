<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D9488">
  <title>Ponte — Painel do dia</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="dash">
  <header class="topbar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 48 32" aria-hidden="true">
        <path d="M4 26 C 4 10, 44 10, 44 26" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        <line x1="4" y1="26" x2="44" y2="26" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <line x1="14" y1="26" x2="14" y2="18.5" stroke="currentColor" stroke-width="2.5"/>
        <line x1="24" y1="26" x2="24" y2="16" stroke="currentColor" stroke-width="2.5"/>
        <line x1="34" y1="26" x2="34" y2="18.5" stroke="currentColor" stroke-width="2.5"/>
      </svg>
      <span class="brand-name">ponte</span>
    </div>
    <nav class="topbar-actions">
      <a class="btn-ghost" href="/" aria-label="Voltar à prancha">← Prancha</a>
    </nav>
  </header>

  <main class="dash-main">
    <h1 class="dash-title">Comunicação de <span id="child-name">…</span> hoje</h1>

    <section class="tiles" aria-label="Totais do dia">
      <div class="tile">
        <span class="tile-value" id="tile-taps">–</span>
        <span class="tile-label">toques em símbolos</span>
      </div>
      <div class="tile">
        <span class="tile-value" id="tile-sentences">–</span>
        <span class="tile-label">frases faladas</span>
      </div>
      <div class="tile">
        <span class="tile-value" id="tile-predictions">–</span>
        <span class="tile-label">sugestões aceitas</span>
      </div>
    </section>

    <section class="chart" aria-label="Símbolos mais usados">
      <h2 class="chart-title">Símbolos mais usados</h2>
      <div id="bars" class="bars"></div>
      <div id="legend" class="legend"></div>
    </section>
  </main>

  <script src="/dashboard.js"></script>
</body>
</html>
